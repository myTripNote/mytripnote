<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>MyTripNote</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#07182d;
    color:white;
}

header{

    padding:80px 20px;
    text-align:center;

    background:
    linear-gradient(
        135deg,
        #0b3a70,
        #04111f
    );

}

.logo{

    font-size:48px;
    font-weight:bold;
    color:#52b6ff;

}

.sub{

    margin-top:20px;
    font-size:22px;
    color:#b8dfff;

}

section{

    max-width:900px;
    margin:auto;
    padding:60px 30px;

}

.card{

    background:#10243f;

    border-radius:20px;

    padding:30px;

    margin-bottom:25px;

    box-shadow:
    0 0 20px rgba(0,180,255,.2);

}

h2{

    color:#6fd4ff;

}

footer{

    padding:40px;
    text-align:center;
    color:#8fb2d6;

}

</style>

</head>

<body>

<header>

<div class="logo">
MyTripNote
</div>

<div class="sub">
Travel. Record. Share.
</div>

</header>

<section>

<div class="card">

<h2>소개</h2>

<p>

MyTripNote는 여행 중의 GPS 이동경로,
사진, 음성메모,
친구와의 위치공유를 하나의 여행노트로
기록하는 모바일 여행 애플리케이션입니다.

</p>

</div>

<div class="card">

<h2>주요 기능</h2>

<ul>

<li>GPS 여행 경로 기록</li>

<li>사진 및 음성 메모</li>

<li>친구 위치 공유</li>

<li>여행 스토리 작성</li>

<li>Presentation 자동 생성</li>

</ul>

</div>

<div class="card">

<h2>개발 상태</h2>

<p>

현재 개발 중인 프로젝트입니다.
정식 출시 예정.

</p>

</div>

</section>

<footer>

ⓒ 2026 MyTripNote

</footer>

</body>

</html>
